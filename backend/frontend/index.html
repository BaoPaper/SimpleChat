<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleChat</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/libs/github-dark.min.css">
    <script src="/libs/marked.min.js"></script>
    <script src="/libs/highlight.min.js"></script>
    <script src="/libs/purify.min.js"></script>
</head>
<body>
    <!-- 登录覆盖层：默认隐藏，认证检查完成后再显示，避免已登录刷新时登录页闪一下 -->
    <div class="login-overlay" id="loginOverlay" style="display: none;">
        <div class="login-card">
            <h1 class="login-logo">SimpleChat</h1>
            <p class="login-subtitle">简洁、快速的 LLM 聊天</p>
            <div class="login-form">
                <input
                    type="text"
                    id="usernameInput"
                    class="login-input"
                    placeholder="用户名"
                    autocomplete="username"
                >
                <input
                    type="password"
                    id="passwordInput"
                    class="login-input"
                    placeholder="密码"
                    autocomplete="current-password"
                >
                <p id="loginError" class="login-error" style="display:none;"></p>
                <button id="loginBtn" class="login-btn">登 录</button>
            </div>
        </div>
    </div>

    <!-- 主应用（登录后显示） -->
    <div class="app-container" id="appContainer" style="display: none;">
        <!-- 左侧侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="logo-area">
                    <h1 class="logo">SimpleChat</h1>
                    <button class="icon-btn" id="sidebarToggle" title="折叠面板">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </button>
                </div>

                <nav class="nav-menu">
                    <button class="nav-item new-chat" id="newChatBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        新对话
                    </button>
                </nav>

                <div class="recent-chats">
                    <h3 class="section-title">历史对话</h3>
                    <ul class="chat-list" id="chatList">
                        <!-- 动态加载 -->
                    </ul>
                    <p id="noSessions" class="empty-hint" style="display:none;">暂无对话，开始聊天吧</p>
                </div>
            </div>

            <div class="sidebar-bottom">
                <div class="user-profile-container">
                    <button class="user-profile-btn" id="userProfileBtn">
                        <span class="user-name" id="displayName">用户</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>

                    <div class="dropdown-menu user-dropdown" id="userDropdown">
                        <button class="dropdown-item" id="themeToggleBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                            <span>切换至暗色模式</span>
                        </button>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item text-danger" id="logoutBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                            <span>退出登录</span>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <button class="sidebar-expand-btn icon-btn" id="sidebarExpandBtn" title="展开面板" style="display:none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
        </button>

        <main class="main-content">
            <div class="chat-area" id="chatArea">
                <div class="greeting-container" id="greetingContainer">
                    <h2 class="greeting-text" id="greetingText">你好，随时开始。</h2>
                </div>
                <div class="messages-container" id="messagesContainer" style="display:none;"></div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <textarea
                        class="main-input"
                        id="chatInput"
                        placeholder="输入消息..."
                        rows="1"
                        autocomplete="off"
                        disabled
                    ></textarea>

                    <div class="model-selector-wrap">
                        <button class="model-selector-btn" id="modelSelectorBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                            <span id="currentModelName">加载中...</span>
                        </button>

                        <div class="dropdown-menu model-dropdown" id="modelDropdown">
                            <!-- 动态加载 -->
                        </div>
                    </div>

                    <button class="send-btn" id="sendBtn" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="/script.js"></script>
</body>
</html>
